name: Keep Alive

on:
  workflow_dispatch:
    inputs:
      data:
        description: '要保存的数据内容'
        required: false
        default: ''
      source:
        description: '数据来源标识'
        required: false
        default: 'keep-alive'
  schedule:
    - cron: '0 0 */3 * *' # 每3天 UTC 0点 (北京时间8点)

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Check switch
        id: switch
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ vars.ENABLE_ALL }}" = "false" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "⏸️ ENABLE_ALL is false, skipping scheduled run"
            elif [ "${{ vars.ENABLE_KEEP_ALIVE }}" = "false" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "⏸️ ENABLE_KEEP_ALIVE is false, skipping scheduled run"
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.switch.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup keep-alive branch
        if: steps.switch.outputs.skip != 'true'
        run: |
          git fetch origin keep-alive 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/keep-alive; then
            git checkout -B keep-alive origin/keep-alive
          else
            git checkout -B keep-alive
          fi

      - name: Set up Node.js
        if: steps.switch.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update keep-alive data
        if: steps.switch.outputs.skip != 'true'
        run: node keep-alive/update.js
        env:
          KEEP_ALIVE_DATA: ${{ github.event.inputs.data || '🔄 Auto keep-alive tick' }}
          KEEP_ALIVE_SOURCE: ${{ github.event.inputs.source || 'keep-alive' }}

      - name: Commit and push
        if: steps.switch.outputs.skip != 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add "data/"
          git diff --staged --quiet || git commit -m "🔄 Keep alive $(date +'%Y-%m-%d')"
          git push origin keep-alive
