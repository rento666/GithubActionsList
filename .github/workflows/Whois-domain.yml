name: Monitor Domain Expiry

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *' # UTC 1点 = 北京时间9点

permissions:
  contents: write

jobs:
  check-domain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios nodemailer

      - name: Monitor domain and notify
        id: monitor
        continue-on-error: true
        run: |
          set -o pipefail
          node Whois-domain/monitor.js 2>&1 | tee /tmp/script-output.txt
        env:
          WHOIS_API_URL: ${{ secrets.WHOIS_API_URL }}
          WHOIS_DOMAIN: ${{ secrets.WHOIS_DOMAIN }}
          WHOIS_LANGUAGE: ${{ secrets.WHOIS_LANGUAGE }}
          WHOIS_NOTIFY_WARNINGS: ${{ secrets.WHOIS_NOTIFY_WARNINGS }}
          WHOIS_NOTIFY_SUCCESS: ${{ secrets.WHOIS_NOTIFY_SUCCESS }}
          WHOIS_NOTIFY_ERRORS: ${{ secrets.WHOIS_NOTIFY_ERRORS }}
          NOTIFY_SMTP_HOST: ${{ secrets.NOTIFY_SMTP_HOST }}
          NOTIFY_SMTP_PORT: ${{ secrets.NOTIFY_SMTP_PORT }}
          NOTIFY_SMTP_USER: ${{ secrets.NOTIFY_SMTP_USER }}
          NOTIFY_SMTP_PASS: ${{ secrets.NOTIFY_SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

      # 将域名检测结果推送到 keep-alive 分支
      - name: Save result to keep-alive branch
        if: always()
        run: |
          git fetch origin keep-alive 2>/dev/null || true
          if git branch -r | grep -q 'origin/keep-alive'; then
            git checkout keep-alive
          else
            git checkout -b keep-alive
          fi
          export KEEP_ALIVE_DATA="$(cat /tmp/script-output.txt)"
          export KEEP_ALIVE_SOURCE="Whois-domain"
          node keep-alive/update.js
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add "data/"
          git diff --staged --quiet || git commit -m "📝 域名监控数据 $(date +'%Y-%m-%d')"
          git push origin keep-alive

      # 如果脚本执行失败，标记 workflow 失败
      - name: Check script result
        if: steps.monitor.outcome == 'failure'
        run: exit 1
