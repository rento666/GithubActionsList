name: Monitor Domain Expiry

on:
  push:
    branches:
      - main
    paths:
      - 'Whois-domain/**'
      - 'utils/**'
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *' # UTC 1点 = 北京时间9点

permissions:
  contents: write

jobs:
  check-domain:
    runs-on: ubuntu-latest

    steps:
      - name: Check switch
        id: switch
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ vars.ENABLE_ALL }}" = "false" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "⏸️ ENABLE_ALL is false, skipping scheduled run"
            elif [ "${{ vars.ENABLE_WHOIS }}" = "false" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "⏸️ ENABLE_WHOIS is false, skipping scheduled run"
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.switch.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        if: steps.switch.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.switch.outputs.skip != 'true'
        run: npm install axios nodemailer

      - name: Monitor domain and notify
        if: steps.switch.outputs.skip != 'true'
        id: monitor
        continue-on-error: true
        run: |
          set -o pipefail
          output=$(node Whois-domain/monitor.js 2>&1)
          echo "$output"
          echo "$output" > /tmp/script-output.txt
          # 提取结构化 JSON 数据
          json_data=$(echo "$output" | sed -n '/__KEEP_ALIVE_JSON__/,/__KEEP_ALIVE_JSON_END__/p' | sed '1d;$d')
          echo "KEEP_ALIVE_JSON=$json_data" >> $GITHUB_ENV
        env:
          WHOIS_API_URL: ${{ secrets.WHOIS_API_URL }}
          WHOIS_DOMAIN: ${{ secrets.WHOIS_DOMAIN }}
          WHOIS_LANGUAGE: ${{ secrets.WHOIS_LANGUAGE }}
          WHOIS_NOTIFY_WARNINGS: ${{ vars.WHOIS_NOTIFY_WARNINGS }}
          WHOIS_NOTIFY_SUCCESS: ${{ vars.WHOIS_NOTIFY_SUCCESS }}
          WHOIS_NOTIFY_ERRORS: ${{ vars.WHOIS_NOTIFY_ERRORS }}
          NOTIFY_SMTP_HOST: ${{ secrets.NOTIFY_SMTP_HOST }}
          NOTIFY_SMTP_PORT: ${{ secrets.NOTIFY_SMTP_PORT }}
          NOTIFY_SMTP_USER: ${{ secrets.NOTIFY_SMTP_USER }}
          NOTIFY_SMTP_PASS: ${{ secrets.NOTIFY_SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

      # 将域名检测结果推送到 keep-alive 分支
      - name: Save result to keep-alive branch
        if: steps.switch.outputs.skip != 'true' && always()
        run: |
          git stash --include-untracked || true
          git fetch origin keep-alive 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/keep-alive; then
            git checkout -B keep-alive origin/keep-alive
          else
            git checkout -B keep-alive
          fi
          export KEEP_ALIVE_SOURCE="Whois-domain"
          # 使用 main 分支上的最新 keep-alive 脚本，避免 keep-alive 分支上的旧版本导致数据格式不一致
          git checkout main -- keep-alive/update.js keep-alive/formatter.js
          # 只传递结构化 JSON 数据，不再传递原始 console 输出
          if [ -n "${{ env.KEEP_ALIVE_JSON }}" ]; then
            export KEEP_ALIVE_JSON="${{ env.KEEP_ALIVE_JSON }}"
          fi
          node keep-alive/update.js
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 只添加 JSON 文件，删除旧的 JSONL 文件
          find data/ -name "data-*.txt" -delete 2>/dev/null || true
          git add "data/"
          git diff --staged --quiet || git commit -m "📝 域名监控数据 $(date +'%Y-%m-%d')"
          git pull --rebase origin keep-alive || true
          git push origin keep-alive

      # 如果脚本执行失败，标记 workflow 失败
      - name: Check script result
        if: steps.switch.outputs.skip != 'true' && steps.monitor.outcome == 'failure'
        run: exit 1
