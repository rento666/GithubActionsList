name: XBGame Check-in

on:
  push:
    branches:
      - main
    paths:
      - 'XBGame/**'
      - 'utils/**'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # UTC 0点 = 北京时间8点

permissions:
  contents: write

jobs:
  check-in:
    runs-on: ubuntu-latest

    steps:
      - name: Check switch
        id: switch
        run: |
          # 定时触发时检查开关，手动/push触发不受限制
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ vars.ENABLE_ALL }}" = "false" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "⏸️ ENABLE_ALL is false, skipping scheduled run"
            elif [ "${{ vars.ENABLE_XBGAME }}" = "false" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "⏸️ ENABLE_XBGAME is false, skipping scheduled run"
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.switch.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        if: steps.switch.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.switch.outputs.skip != 'true'
        run: npm install axios nodemailer

      - name: XBGame Login & Check-in
        if: steps.switch.outputs.skip != 'true'
        id: checkin
        continue-on-error: true
        run: |
          set -o pipefail
          node XBGame/checkin.js 2>&1 | tee /tmp/script-output.txt
        env:
          XB_USERNAME: ${{ secrets.XB_USERNAME }}
          XB_PASSWORD: ${{ secrets.XB_PASSWORD }}
          XB_NOTIFY_SUCCESS: ${{ secrets.XB_NOTIFY_SUCCESS }}
          XB_NOTIFY_ERRORS: ${{ secrets.XB_NOTIFY_ERRORS }}
          NOTIFY_SMTP_HOST: ${{ secrets.NOTIFY_SMTP_HOST }}
          NOTIFY_SMTP_PORT: ${{ secrets.NOTIFY_SMTP_PORT }}
          NOTIFY_SMTP_USER: ${{ secrets.NOTIFY_SMTP_USER }}
          NOTIFY_SMTP_PASS: ${{ secrets.NOTIFY_SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

      # 将签到结果推送到 keep-alive 分支
      - name: Save result to keep-alive branch
        if: steps.switch.outputs.skip != 'true' && always()
        run: |
          git fetch origin keep-alive 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/keep-alive; then
            git checkout -B keep-alive origin/keep-alive
          else
            git checkout -B keep-alive
          fi
          export KEEP_ALIVE_DATA="$(cat /tmp/script-output.txt)"
          export KEEP_ALIVE_SOURCE="XBGame"
          node keep-alive/update.js
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add "data/"
          git diff --staged --quiet || git commit -m "📝 XBGame签到数据 $(date +'%Y-%m-%d')"
          git push origin keep-alive

      # 如果脚本执行失败，标记 workflow 失败
      - name: Check script result
        if: steps.switch.outputs.skip != 'true' && steps.checkin.outcome == 'failure'
        run: exit 1
